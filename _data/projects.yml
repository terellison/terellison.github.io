# =============================================================
#  Projects shown on /projects/ and (when featured) the homepage.
#  Sourced from github.com/terellison — edit freely.
#
#  Fields:
#    name        – display name
#    description – one or two sentences
#    tech        – list of languages/frameworks (shown as tags)
#    repo        – GitHub URL (optional)
#    demo        – live demo / homepage URL (optional)
#    stars       – GitHub star count (optional, shown as a badge)
#    featured    – fallback flag: rendered on the homepage when JavaScript
#                  is off or the live pinned-repository fetch fails. When it
#                  succeeds, the homepage mirrors the repos pinned on the
#                  GitHub profile instead (see assets/js/pinned-projects.js).
# =============================================================

