<footer class="site-footer">
  <div class="wrapper wrapper--wide">
    <div class="footer-inner">
      <div class="footer-meta">
        &copy; {{ site.time | date: "%Y" }} {{ site.author.name }} ·
        Built with <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a> ·
        <a href="{{ site.repo }}" target="_blank" rel="noopener">Source</a>
      </div>
      <div class="footer-social">
        {%- for link in site.data.social -%}
          <a
            class="icon-btn"
            href="{{ link.url }}"
            aria-label="{{ link.name }}"
            {% unless link.url contains "mailto" %}target="_blank" rel="noopener"{% endunless %}
          >{% include icon.html name=link.icon %}</a>
        {%- endfor -%}
      </div>
    </div>
  </div>
</footer>
