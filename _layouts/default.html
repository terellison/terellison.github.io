<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
{% include head.html %}
<body class="preload">
  <div class="site">
    {% include nav.html %}
    <main class="site-main" id="content">
      <div class="wrapper {% if page.wide %}wrapper--wide{% endif %}">
        {{ content }}
      </div>
    </main>
    {% include footer.html %}
  </div>
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
