---
layout: default
---

<div class="page">
  {%- unless page.hide_header -%}
  <header class="page-header">
    <h1>{{ page.title | escape }}</h1>
    {%- if page.description -%}
    <p class="page-header__lede">{{ page.description }}</p>
    {%- endif -%}
  </header>
  {%- endunless -%}

  {%- if page.prose -%}
  <div class="prose">{{ content }}</div>
  {%- else -%}
  {{ content }}
  {%- endif -%}
</div>
