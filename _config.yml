# ======================= Site settings =======================
title: Terry Ellison
description: >-
  Portfolio and technical blog of Terry Ellison — a tools & engine software
  engineer working in game development.
lang: en-US
timezone: America/New_York
repo: https://github.com/terellison/terellison.github.io

# Default color theme: "light" or "dark".
# Visitors' system preference and their saved choice take precedence.
mode: light

# ======================= Profile =============================
author:
  name: Terry Ellison
  bio: >-
    Hello! I'm a software engineer originally from St. Petersburg, Florida.
    I'm currently a Tools Software Engineer at Electronic Arts, building
    developer tools and workflows for game teams. My background spans Unreal
    Engine and Frostbite tooling, Xbox platform development, and full-stack
    work across the .NET ecosystem. I'm passionate about learning and taking
    full ownership of the code I ship.
  bio-short: >-
    Tools & engine software engineer building developer workflows for game
    teams, with a background spanning Unreal Engine, Xbox platforms, and
    full-stack .NET.
  username: terellison
  github: terellison
  email: ellisonterry4@gmail.com
  avatar: /assets/img/headshot.jpeg

# ======================= URLs ================================
url: "https://dev.terellison.net"
baseurl: ""
permalink: /blog/:title/
google_analytics: G-1YY1LGYC19

# ======================= Collections ========================
collections:
  posts:
    output: true

# ======================= Markdown ===========================
markdown: kramdown
highlighter: rouge
excerpt_separator: "<!--more-->"
kramdown:
  syntax_highlighter: rouge
  input: GFM

# ======================= Defaults ===========================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false

# How many recent posts to show on the homepage.
number_of_posts: 5

# ======================= Pinned repos =======================
# The homepage "Featured Projects" section is upgraded at runtime to mirror
# the repositories pinned on the GitHub profile. Pinned items aren't exposed
# by GitHub's CORS-enabled REST API, so the browser reads them from a small
# public proxy that returns JSON. Results are cached in localStorage.
# Swap `endpoint` if the proxy ever goes away ({user} is replaced with
# author.github). Set endpoint to "" to disable and always show the static
# `featured: true` projects from _data/projects.yml.
pinned_repos:
  endpoint: "https://gh-pinned-repos.egoist.dev/?username={user}"
  cache_minutes: 360

# ======================= Authoring ==========================
# `bundle exec jekyll post "My Title"` scaffolds a new post with this
# front matter. See AUTHORING.md for the full workflow.
jekyll_compose:
  auto_open: false
  default_front_matter:
    posts:
      layout: post
      description:
      tags: []
    drafts:
      layout: post
      description:
      tags: []

# ======================= Build ==============================
sass:
  style: compressed
  sass_dir: _sass

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - AUTHORING.md
  - klise.gemspec
  - now.json
  - vendor
  - node_modules
  - .github
