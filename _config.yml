# ======================= Site settings =======================
title: Terry Ellison
description: >-
  Portfolio and technical blog of Terry Ellison — a software developer
  focused on backend .NET and dependable systems.
lang: en-US
timezone: America/New_York
repo: https://github.com/terellison/terellison.github.io

# Default color theme: "light" or "dark".
# Visitors' system preference and their saved choice take precedence.
mode: light

# ======================= Profile =============================
author:
  name: Terry Ellison
  bio: >-
    Hello! I'm a software developer from St. Petersburg, Florida. I currently
    specialize in backend development across the .NET ecosystem — C#, .NET Core,
    and .NET Framework. I'm passionate about learning, clean design, and taking
    full ownership of the code I ship.
  bio-short: >-
    Backend-focused software developer who loves solving complex problems with
    robust, reliable solutions.
  username: terellison
  github: terellison
  email: ellisonterry4@gmail.com
  avatar: /assets/img/headshot.jpeg

# ======================= URLs ================================
url: "https://dev.terellison.net"
baseurl: ""
permalink: /blog/:title/
google_analytics: G-1YY1LGYC19

# ======================= Collections ========================
collections:
  posts:
    output: true

# ======================= Markdown ===========================
markdown: kramdown
highlighter: rouge
excerpt_separator: "<!--more-->"
kramdown:
  syntax_highlighter: rouge
  input: GFM

# ======================= Defaults ===========================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false

# How many recent posts to show on the homepage.
number_of_posts: 5

# ======================= Authoring ==========================
# `bundle exec jekyll post "My Title"` scaffolds a new post with this
# front matter. See AUTHORING.md for the full workflow.
jekyll_compose:
  auto_open: false
  default_front_matter:
    posts:
      layout: post
      description:
      tags: []
    drafts:
      layout: post
      description:
      tags: []

# ======================= Build ==============================
sass:
  style: compressed
  sass_dir: _sass

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - AUTHORING.md
  - klise.gemspec
  - now.json
  - vendor
  - node_modules
  - .github
